const DEFCATS=[
  {id:"ventas",label:"Ventas",emoji:"💼",g:"#b8916a,#d4aa7d"},
  {id:"contenido",label:"Contenido & Marca personal",emoji:"✨",g:"#c4a882,#e8c99a"},

const S={
  view:"login",user:null,token:null,
  videos:[],mats:[],seen:new Set(),
  search:"",tab:"caps",matCat:"all",
  openCats:new Set(),modal:null,cats:[...DEFCATS],loading:false
};

const H=()=>({"Content-Type":"application/json","apikey":SKEY,"Authorization":`Bearer ${S.token||SKEY}`});

async function req(path,opts={}){
  try{const r=await fetch(SURL+path,{headers:H(),...opts});return await r.json();}
  catch(e){return null;}
}

function isAdmin(){return ADMINS.includes(S.user?.email);}
function ytId(url){const m=url&&url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([a-zA-Z0-9_-]{11})/);return m?m[1]:null;}

async function loadCats(){
  const d=await req("/rest/v1/modulos?order=orden.asc");
  if(Array.isArray(d)&&d.length>0)S.cats=d.map(m=>({id:m.id,label:m.label,emoji:m.emoji,g:m.gradient}));
  else S.cats=[...DEFCATS];
}

async function loadVideos(){
  const d=await req("/rest/v1/capacitaciones?order=created_at.asc");
  if(Array.isArray(d))S.videos=d.map(v=>({id:v.id,catId:v.cat_id,title:v.title,date:v.date||"",dur:v.duration||"",sum:v.summary||"",url:v.url||""}));
}

async function loadMats(){
  const d=await req("/rest/v1/materiales?order=created_at.desc");
  if(Array.isArray(d))S.mats=d;
}

async function doLogin(email,pass){
  const r=await req("/auth/v1/token?grant_type=password",{method:"POST",body:JSON.stringify({email,password:pass})});
  if(r&&r.access_token){
    S.user=r.user;S.token=r.access_token;S.view="portal";
    try{localStorage.setItem("af_s",JSON.stringify({user:r.user,token:r.access_token}));}catch(e){}
    return null;
  }
  return "Credenciales incorrectas";
}

function doLogout(){
  Object.assign(S,{user:null,token:null,view:"login",videos:[],mats:[],seen:new Set(),search:"",openCats:new Set(),tab:"caps"});
  try{localStorage.removeItem("af_s");}catch(e){}
  paint();
}

async function saveVideo(f,editId){
  const body=JSON.stringify({title:f.title,cat_id:f.catId,date:f.date,duration:f.dur,summary:f.sum,url:f.url});
  if(editId)await fetch(`${SURL}/rest/v1/capacitaciones?id=eq.${editId}`,{method:"PATCH",headers:H(),body});
  else await fetch(`${SURL}/rest/v1/capacitaciones`,{method:"POST",headers:{...H(),"Prefer":"return=representation"},body});
  closeModal();
  await loadVideos();
  paintMain();
}

async function delVideo(id){
  if(!confirm("¿Eliminar?"))return;
  await fetch(`${SURL}/rest/v1/capacitaciones?id=eq.${id}`,{method:"DELETE",headers:H()});
  await loadVideos();
  paintMain();
}

async function delMat(id,url){
  if(!confirm("¿Eliminar?"))return;
  const p=url.split("/materiales/")[1];
  if(p)await fetch(`${SURL}/storage/v1/object/materiales/${p}`,{method:"DELETE",headers:H()});
  await fetch(`${SURL}/rest/v1/materiales?id=eq.${id}`,{method:"DELETE",headers:H()});
  await loadMats();
  paintMain();
}

async function uploadMat(file,nombre,desc,cat){
  const ext=file.name.split(".").pop();
  const p=`${Date.now()}_${Math.random().toString(36).slice(2)}.${ext}`;
  const r=await fetch(`${SURL}/storage/v1/object/materiales/${p}`,{method:"POST",headers:{"apikey":SKEY,"Authorization":`Bearer ${S.token}`,"Content-Type":file.type},body:file});
  if(!r.ok)return "Error al subir archivo";
  const url=`${SURL}/storage/v1/object/public/materiales/${p}`;
  await fetch(`${SURL}/rest/v1/materiales`,{method:"POST",headers:{...H(),"Prefer":"return=representation"},body:JSON.stringify({nombre,descripcion:desc,categoria:cat,archivo_url:url})});
  await loadMats();
  return null;
}

async function changePass(curr,np){
  const lr=await req("/auth/v1/token?grant_type=password",{method:"POST",body:JSON.stringify({email:S.user.email,password:curr})});
  if(!lr||!lr.access_token)return "Contraseña actual incorrecta";
  const r=await fetch(`${SURL}/auth/v1/user`,{method:"PUT",headers:{...H(),"Authorization":`Bearer ${lr.access_token}`},body:JSON.stringify({password:np})});
  const d=await r.json();
  return d.id?null:"Error al cambiar contraseña";
}

async function saveCat(cat,isEdit){
  if(isEdit){
    await fetch(`${SURL}/rest/v1/modulos?id=eq.${cat.id}`,{method:"PATCH",headers:H(),body:JSON.stringify({label:cat.label,emoji:cat.emoji,gradient:cat.g})});
  } else {
    await fetch(`${SURL}/rest/v1/modulos`,{method:"POST",headers:{...H(),"Prefer":"return=representation"},body:JSON.stringify({id:cat.id,label:cat.label,emoji:cat.emoji,gradient:cat.g,orden:S.cats.length+1})});
  }
  await loadCats();
}

async function delCat(id){
  await fetch(`${SURL}/rest/v1/modulos?id=eq.${id}`,{method:"DELETE",headers:H()});
  await loadCats();
}


async function loadMembers(){
  const d=await req("/rest/v1/af_miembros?order=created_at.desc");
  return Array.isArray(d)?d:[];
}

async function inviteUser(email,password,nombre){
  // 1. Crear cuenta en Supabase Auth
  const r=await fetch(`${SURL}/auth/v1/signup`,{
    method:"POST",
    headers:{"apikey":SKEY,"Content-Type":"application/json"},
    body:JSON.stringify({email,password})
  });
  const d=await r.json();
  if(!r.ok)return d.msg||d.message||d.error_description||"Error al crear usuario";
  // 2. Guardar en tabla af_miembros
  await fetch(`${SURL}/rest/v1/af_miembros`,{
    method:"POST",
    headers:{...H(),"Prefer":"return=minimal"},
    body:JSON.stringify({email,nombre,rol:"miembro"})
  });
  return null;
}

async function deleteMember(id){
  await fetch(`${SURL}/rest/v1/af_miembros?id=eq.${id}`,{method:"DELETE",headers:H()});
}

function toggleSeen(id){
  if(S.seen.has(id))S.seen.delete(id);
  else{S.seen.add(id);req("/rest/v1/actividad",{method:"POST",headers:{...H(),"Prefer":"return=minimal"},body:JSON.stringify({user_email:S.user.email,tipo:"capacitacion_vista",referencia_id:id})});}
  paintAccordion();
  updateHeroStats();
}

function updateHeroStats(){
  const t=S.videos.length,sc=S.seen.size,pct=t?Math.round(sc/t*100):0;
  const nums=document.querySelectorAll(".hstat-num");
  if(nums[0])nums[0].textContent=t;
  if(nums[1])nums[1].textContent=sc;
  if(nums[2])nums[2].textContent=pct+"%";
  const pf=document.querySelector(".prog-fill");if(pf)pf.style.width=pct+"%";
  const pp=document.querySelector(".prog-pct");if(pp)pp.textContent=`${sc} / ${t}`;
}

function paint(){

  app.innerHTML=`${headerHTML()}${heroHTML()}<div class="main" id="main"></div>`;
  bindHeader();
  paintMain();
}

function paintMain(){
  const el=document.getElementById("main");
  if(!el){paint();return;}
  el.innerHTML=mainHTML();
  bindMain();
}

function paintAccordion(){
  const el=document.getElementById("acc");
  if(!el){paintMain();return;}
  el.innerHTML=accHTML();
  bindAcc();
}

function accHTML(){
  const sq=S.search.toLowerCase().trim();
  return S.cats.map(cat=>{
    const all=S.videos.filter(v=>v.catId===cat.id);
    const vids=sq?all.filter(v=>v.title.toLowerCase().includes(sq)||v.sum.toLowerCase().includes(sq)):all;
    if(vids.length===0&&sq)return "";
    if(vids.length===0&&!isAdmin())return "";
    const cs=all.filter(v=>S.seen.has(v.id)).length;
    const cp=all.length?Math.round(cs/all.length*100):0;
    const open=S.openCats.has(cat.id)||(sq.length>0&&vids.length>0);
    return `<div class="acc-mod">
      <div class="acc-head" data-tog="${cat.id}">
        <div class="acc-left">
          <div class="acc-icon">${cat.emoji}</div>
          <div>
            <p class="acc-name">${cat.label}</p>
            <p class="acc-meta">${all.length} conferencia${all.length!==1?"s":""} · ${cs} completada${cs!==1?"s":""}</p>
          </div>
        </div>
        <div class="acc-right">
          <div class="acc-prog-wrap"><div class="acc-prog-fill" style="width:${cp}%"></div></div>
          <span class="acc-pct">${cp}%</span>
          <span class="acc-arrow">${open?"▲":"▼"}</span>
        </div>
      </div>
      ${open?`<div class="acc-body">
        ${vids.length===0?`<div class="empty">Sin conferencias aún.</div>`:""}
        ${vids.map((v,i)=>{
          const seen=S.seen.has(v.id);
          const yt=ytId(v.url);
          const thumb=yt?`https://img.youtube.com/vi/${yt}/hqdefault.jpg`:"https://images.unsplash.com/photo-1522335789203-aabd1fc54bc9?w=200&q=60";
          return `<div class="conf-row${seen?" seen":""}">
            <div class="conf-num">${i+1}</div>
            <div class="conf-thumb" data-play="${v.id}">
              <img src="${thumb}" loading="lazy" alt=""/>
              <div class="conf-play-overlay"><div class="conf-play-tri"></div></div>
            </div>
            <div class="conf-info">
              <p class="conf-title" data-play="${v.id}">${v.title}</p>
              <div class="conf-metas">
                ${v.dur?`<span class="conf-meta">⏱ ${v.dur}</span>`:""}
                ${v.date?`<span class="conf-meta">📅 ${v.date}</span>`:""}
                ${seen?`<span class="conf-seen-tag">✓ Vista</span>`:""}
              </div>
              ${v.sum?`<p class="conf-sum">${v.sum}</p>`:""}
            </div>
            <div class="conf-acts">
              <button class="btn-play" data-play="${v.id}">▶</button>
              <button class="btn-check${seen?" on":""}" data-seen="${v.id}">${seen?"✓":"○"}</button>
              ${isAdmin()?`<button class="btn-icon-sm" data-edit="${v.id}">✏</button><button class="btn-icon-sm" data-del="${v.id}">✕</button>`:""}
            </div>
          </div>`;
        }).join("")}
        ${isAdmin()?`<button class="add-conf-btn" data-addcat="${cat.id}">+ Agregar conferencia a ${cat.label}</button>`:""}
      </div>`:""}
    </div>`;
  }).join("");
}

// ── BIND ──────────────────────────────────────────────────────────

function bindLogin(){
  const btn=document.getElementById("lb");
  const go=async()=>{
    const e=document.getElementById("le").value.trim();
    const p=document.getElementById("lp").value;
    if(!e||!p)return;
    btn.disabled=true;btn.textContent="Verificando...";
    const err=await doLogin(e,p);
    if(err){
      btn.disabled=false;btn.textContent="Ingresar";
      const el=document.getElementById("lerr");el.textContent=err;el.style.display="block";
    } else {
      // Limpiar datos anteriores
      S.videos=[];S.mats=[];S.seen=new Set();S.cats=[...DEFCATS];S.openCats=new Set();S.search="";
      // Mostrar loading
      document.getElementById("app").innerHTML=`
        <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#1a1510">
          <div style="text-align:center">
            <p style="font-family:'Playfair Display',serif;font-size:28px;color:#fffdf9;margin-bottom:8px">Academia <em style="color:#e8c99a;font-style:italic">Ferrari</em></p>
            <p style="font-size:10px;letter-spacing:3px;text-transform:uppercase;color:#b0a090;margin-top:16px">Cargando...</p>
          </div>
        </div>`;
      await Promise.all([loadCats(),loadVideos(),loadMats()]);
      paint();
    }
  };
  btn.addEventListener("click",go);
  ["le","lp"].forEach(id=>document.getElementById(id)?.addEventListener("keydown",e=>e.key==="Enter"&&go()));
}

function bindHeader(){
  const closeM=()=>document.getElementById("mmenu")?.classList.remove("open");
  document.getElementById("hbtn")?.addEventListener("click",()=>document.getElementById("mmenu")?.classList.add("open"));
  document.getElementById("mclose")?.addEventListener("click",closeM);
  document.getElementById("bout")?.addEventListener("click",doLogout);
  document.getElementById("mbout")?.addEventListener("click",doLogout);
  document.getElementById("bpass")?.addEventListener("click",()=>openModal("pass"));
  document.getElementById("mbpass")?.addEventListener("click",()=>{closeM();openModal("pass");});
  document.getElementById("bmods")?.addEventListener("click",()=>openModal("mods"));
  document.getElementById("mbmods")?.addEventListener("click",()=>{closeM();openModal("mods");});
  document.getElementById("bteam")?.addEventListener("click",()=>openModal("members"));
  document.getElementById("mbteam")?.addEventListener("click",()=>{closeM();openModal("members");});
  document.querySelectorAll("[data-tab]").forEach(el=>el.addEventListener("click",()=>{
    S.tab=el.dataset.tab;closeM();
    document.querySelectorAll("[data-tab]").forEach(b=>b.classList.toggle("on",b.dataset.tab===S.tab));
    paintMain();
    if(S.tab==="stats")loadStats();
  }));
}

function bindMain(){
  const si=document.getElementById("si");
  if(si){
    si.addEventListener("input",e=>{S.search=e.target.value;paintAccordion();});
    si.addEventListener("keydown",e=>e.stopPropagation());
  }
  bindAcc();
  document.querySelectorAll("[data-mc]").forEach(el=>el.addEventListener("click",()=>{S.matCat=el.dataset.mc;paintMain();}));
  document.getElementById("badd")?.addEventListener("click",()=>openModal("matform"));
  document.querySelectorAll("[data-mu]").forEach(el=>el.addEventListener("click",()=>{
    req("/rest/v1/actividad",{method:"POST",headers:{...H(),"Prefer":"return=minimal"},body:JSON.stringify({user_email:S.user.email,tipo:"material_descargado"})});
    const a=document.createElement("a");a.href=el.dataset.mu;a.download=el.dataset.mn||"material";a.target="_blank";a.click();
  }));
  document.querySelectorAll("[data-mdel]").forEach(el=>el.addEventListener("click",()=>delMat(parseInt(el.dataset.mdel),el.dataset.mu2)));
}

function bindAcc(){
  document.querySelectorAll(".acc-head[data-tog]").forEach(el=>el.addEventListener("click",()=>{
    const id=el.dataset.tog;
    if(S.openCats.has(id))S.openCats.delete(id);else S.openCats.add(id);
    paintAccordion();
  }));
  document.querySelectorAll("[data-seen]").forEach(el=>el.addEventListener("click",e=>{e.stopPropagation();toggleSeen(parseInt(el.dataset.seen));}));
  document.querySelectorAll("[data-play]").forEach(el=>el.addEventListener("click",e=>{
    e.stopPropagation();
    const v=S.videos.find(v=>v.id==el.dataset.play);
    if(v)openModal("player",v);
  }));
  document.querySelectorAll("[data-edit]").forEach(el=>el.addEventListener("click",e=>{
    e.stopPropagation();
    const v=S.videos.find(v=>v.id==el.dataset.edit);
    if(v)openModal("vform",v);
  }));
  document.querySelectorAll("[data-del]").forEach(el=>el.addEventListener("click",e=>{e.stopPropagation();delVideo(parseInt(el.dataset.del));}));
  document.querySelectorAll("[data-addcat]").forEach(el=>el.addEventListener("click",()=>openModal("vform",{catId:el.dataset.addcat})));
}

async function loadStats(){
  const panel=document.getElementById("stats-panel");if(!panel)return;
  const d=await req("/rest/v1/actividad?order=created_at.desc");
  const arr=Array.isArray(d)?d:[];
  const by={};
  arr.forEach(a=>{
    if(!by[a.user_email])by[a.user_email]={email:a.user_email,v:0,dl:0,last:a.created_at};
    if(a.tipo==="capacitacion_vista")by[a.user_email].v++;
    if(a.tipo==="material_descargado")by[a.user_email].dl++;
    if(a.created_at>by[a.user_email].last)by[a.user_email].last=a.created_at;
  });
  const rank=Object.values(by).sort((a,b)=>(b.v+b.dl)-(a.v+a.dl));
  const nums=["I","II","III","IV","V","VI","VII","VIII","IX","X"];
  panel.innerHTML=rank.length===0?`<div class="empty">Sin actividad aún.</div>`:`<div class="an-grid">${rank.map((u,i)=>`<div class="an-card">
    <p class="an-rank">${nums[i]||i+1}</p>
    <p class="an-email">${u.email}</p>
    <div class="an-stats">
      <div><p class="an-num">${u.v}</p><p class="an-lbl">Vistas</p></div>
      <div><p class="an-num">${u.dl}</p><p class="an-lbl">Descargas</p></div>
    </div>
    <p style="font-size:10px;color:var(--text3);margin-top:10px">Última: ${new Date(u.last).toLocaleDateString("es-ES",{day:"2-digit",month:"short",year:"numeric"})}</p>
  </div>`).join("")}</div>`;
}

// ── MODALS ────────────────────────────────────────────────────────

function openModal(type,data={}){S.modal={type,data};renderModal();}
function closeModal(){S.modal=null;document.getElementById("mc")?.remove();}

function renderModal(){
  document.getElementById("mc")?.remove();
  if(!S.modal)return;
  const{type,data}=S.modal;
  const div=document.createElement("div");div.id="mc";

  if(type==="player"){
    const yt=ytId(data.url);
    const thumb=yt?`https://img.youtube.com/vi/${yt}/hqdefault.jpg`:"https://images.unsplash.com/photo-1522335789203-aabd1fc54bc9?w=660&q=80";
    div.innerHTML=`<div class="modal-bg" id="mbg"><div class="player-wrap">
      <div class="player-head">
        <div><p class="player-ey">Capacitación</p><p class="player-tit">${data.title}</p></div>
        <button class="player-close" id="pcl">×</button>
      </div>
      <div class="player-thumb" id="pth">

        <div class="player-overlay"><div class="player-play"><div class="player-play-tri"></div></div></div>
      </div>
      <div class="player-body">
        <p class="player-sum">${data.sum}</p>
        <button class="btn-player" id="pwatch">▶ Ver capacitación completa</button>
      </div>
    </div></div>`;
    document.body.appendChild(div);
    div.querySelector("#pcl").addEventListener("click",closeModal);
    div.querySelector("#mbg").addEventListener("click",e=>{if(e.target.id==="mbg")closeModal();});
    div.querySelector("#pwatch").addEventListener("click",()=>window.open(data.url,"_blank"));

      <label class="f-label">Link de YouTube o Google Drive</label>

      <div class="modal-btns">
        <button class="btn-mc" id="mcl">Cancelar</button>
        <button class="btn-ms" id="mss">Guardar</button>
      </div>
    </div></div>`;
    document.body.appendChild(div);
    div.querySelector("#mcl").addEventListener("click",closeModal);
    div.querySelector("#mbg").addEventListener("click",e=>{if(e.target.id==="mbg")closeModal();});
    div.querySelector("#mss").addEventListener("click",async()=>{
      const f={title:div.querySelector("#vt").value,catId:div.querySelector("#vc").value,date:div.querySelector("#vd").value,dur:div.querySelector("#vdur").value,url:div.querySelector("#vu").value,sum:div.querySelector("#vs").value};
      if(!f.title||!f.url)return;
      const btn=div.querySelector("#mss");btn.disabled=true;btn.textContent="Guardando...";
      await saveVideo(f,data.id||null);

    return;
  }

  if(type==="matform"){

      <p class="modal-ey">Biblioteca</p>

      <input class="f-inp" id="mn" placeholder="Ej: Manual de ventas"/>
      <label class="f-label">Categoría</label>
      <select class="f-sel" id="mcat">${MATCATS.map(c=>`<option value="${c}">${c}</option>`).join("")}</select>
      <label class="f-label">Descripción</label>
      <textarea class="f-ta" id="md" placeholder="Breve descripción..."></textarea>

        <p class="upload-txt" id="utxt">Seleccionar archivo</p>
        <p class="upload-sub">PDF, DOC, DOCX, XLS, PPT · Máx 50MB</p>
        <input type="file" id="mf" accept=".pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx" style="display:none"/>
      </div>
      <div id="upw" style="display:none">
        <div class="upload-prog-wrap"><div class="upload-prog-fill" id="upf" style="width:0%"></div></div>
        <p style="font-size:11px;color:var(--gold);text-align:center;margin-top:6px" id="upt">Subiendo...</p>
      </div>
      <p class="err-msg" id="merr" style="display:none"></p>
      <div class="modal-btns">
        <button class="btn-mc" id="mcl">Cancelar</button>
        <button class="btn-ms" id="mss">Subir material</button>
      </div>
    </div></div>`;
    document.body.appendChild(div);
    div.querySelector("#mcl").addEventListener("click",closeModal);
    div.querySelector("#mbg").addEventListener("click",e=>{if(e.target.id==="mbg")closeModal();});
    const uz=div.querySelector("#uz");
    uz.addEventListener("click",()=>div.querySelector("#mf").click());
    div.querySelector("#mf").addEventListener("change",e=>{selFile=e.target.files[0];if(selFile)div.querySelector("#utxt").textContent="✓ "+selFile.name;});
    uz.addEventListener("dragover",e=>{e.preventDefault();uz.classList.add("drag");});
    uz.addEventListener("dragleave",()=>uz.classList.remove("drag"));
    uz.addEventListener("drop",e=>{e.preventDefault();uz.classList.remove("drag");selFile=e.dataTransfer.files[0];if(selFile)div.querySelector("#utxt").textContent="✓ "+selFile.name;});
    div.querySelector("#mss").addEventListener("click",async()=>{
      const nombre=div.querySelector("#mn").value.trim();
      const desc=div.querySelector("#md").value.trim();
      const cat=div.querySelector("#mcat").value;
      const errEl=div.querySelector("#merr");errEl.style.display="none";
      if(!nombre){errEl.textContent="Escribe el nombre";errEl.style.display="block";return;}
      if(!selFile){errEl.textContent="Selecciona un archivo";errEl.style.display="block";return;}
      const btn=div.querySelector("#mss");btn.disabled=true;btn.textContent="Subiendo...";
      div.querySelector("#upw").style.display="block";
      let p=0;const iv=setInterval(()=>{p=Math.min(p+8,85);div.querySelector("#upf").style.width=p+"%";},200);
      const err=await uploadMat(selFile,nombre,desc,cat);
      clearInterval(iv);div.querySelector("#upf").style.width="100%";
      if(err){errEl.textContent=err;errEl.style.display="block";btn.disabled=false;btn.textContent="Subir material";}
      else{div.querySelector("#upt").textContent="¡Subido!";setTimeout(closeModal,600);}
    });
    return;
  }

  if(type==="mods"){
    const rl=()=>{
      const c=div.querySelector("#ml");if(!c)return;
      c.innerHTML=S.cats.map(cat=>`<div class="mod-row">
        <span style="font-size:19px">${cat.emoji}</span>
        <span style="flex:1;font-size:13px;color:var(--text)">${cat.label}</span>
        <button class="btn-icon-sm" data-me="${cat.id}">✏</button>
        <button class="btn-icon-sm" data-md="${cat.id}">✕</button>
      </div>`).join("")+`<button class="btn-gold" id="bnm" style="margin-top:14px">+ Nuevo módulo</button>`;
      c.querySelectorAll("[data-md]").forEach(el=>el.addEventListener("click",async()=>{
        const cat=S.cats.find(c=>c.id===el.dataset.md);
        if(cat&&confirm(`¿Eliminar "${cat.label}"?`)){await delCat(cat.id);rl();}
      }));
      c.querySelectorAll("[data-me]").forEach(el=>el.addEventListener("click",()=>{
        const cat=S.cats.find(c=>c.id===el.dataset.me);
        if(cat){closeModal();openModal("modform",{...cat,isEdit:true});}
      }));
      div.querySelector("#bnm")?.addEventListener("click",()=>{closeModal();openModal("modform",{});});
    };
    div.innerHTML=`<div class="modal-bg" id="mbg"><div class="modal">
      <p class="modal-ey">Configuración</p>
      <h3 class="modal-title">Gestión de módulos</h3>
      <div id="ml"></div>
      <div class="modal-btns"><button class="btn-mc" id="mcl">Cerrar</button></div>
    </div></div>`;
    document.body.appendChild(div);
    div.querySelector("#mcl").addEventListener("click",closeModal);
    div.querySelector("#mbg").addEventListener("click",e=>{if(e.target.id==="mbg")closeModal();});
    rl();return;
  }

  if(type==="modform"){
    const isEdit=!!data.isEdit;
    let selE=data.emoji||EMOJIS[0],selG=data.g||GRADS[0];
    div.innerHTML=`<div class="modal-bg" id="mbg"><div class="modal">
      <p class="modal-ey">${isEdit?"Editar":"Nuevo"} módulo</p>
      <h3 class="modal-title">${isEdit?"Editar módulo":"Crear módulo"}</h3>
      <label class="f-label">Nombre</label>
      <input class="f-inp" id="mln" value="${data.label||""}" placeholder="Ej: Liderazgo"/>
      <label class="f-label">Ícono</label>
      <div class="emoji-grid">${EMOJIS.map(e=>`<button class="emoji-btn${e===selE?" on":""}" data-e="${e}">${e}</button>`).join("")}</div>
      <label class="f-label">Color</label>
      <div class="grad-grid">${GRADS.map(g=>`<div class="grad-sw${g===selG?" on":""}" data-g="${g}" style="background:linear-gradient(135deg,${g})"></div>`).join("")}</div>
      <div class="modal-btns">
        <button class="btn-mc" id="mcl">Cancelar</button>
        <button class="btn-ms" id="mss">Guardar</button>
      </div>
    </div></div>`;
    document.body.appendChild(div);
    const back=()=>{closeModal();openModal("mods");};
    div.querySelector("#mcl").addEventListener("click",back);
    div.querySelector("#mbg").addEventListener("click",e=>{if(e.target.id==="mbg")back();});
    div.querySelectorAll("[data-e]").forEach(el=>el.addEventListener("click",()=>{selE=el.dataset.e;div.querySelectorAll("[data-e]").forEach(b=>b.classList.toggle("on",b.dataset.e===selE));}));
    div.querySelectorAll("[data-g]").forEach(el=>el.addEventListener("click",()=>{selG=el.dataset.g;div.querySelectorAll("[data-g]").forEach(b=>b.classList.toggle("on",b.dataset.g===selG));}));
    div.querySelector("#mss").addEventListener("click",async()=>{
      const name=div.querySelector("#mln").value.trim();if(!name)return;
      const btn=div.querySelector("#mss");btn.disabled=true;btn.textContent="Guardando...";
      await saveCat({id:isEdit?data.id:"m"+Date.now(),label:name,emoji:selE,g:selG},isEdit);
      closeModal();openModal("mods");paintAccordion();
    });
    return;
  }

  if(type==="members"){
    const rl=async()=>{
      const c=div.querySelector("#mlist");if(!c)return;
      c.innerHTML=`<div class="loading-txt">Cargando equipo...</div>`;
      const users=await loadMembers();
      const isAdminEmail=u=>ADMINS.includes(u.email);
      c.innerHTML=users.length===0?
        `<div class="empty" style="margin-bottom:12px">No hay miembros aún.</div><button class="btn-gold" id="bnm">+ Agregar miembro</button>`:
        users.map(u=>`<div class="mod-row" style="align-items:center">
          <div style="width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold2));display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--dark);font-weight:600;flex-shrink:0">${(u.nombre||u.email||"?")[0].toUpperCase()}</div>
          <div style="flex:1;min-width:0">
            <p style="font-size:13px;color:var(--text);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${u.nombre||"Sin nombre"}</p>
            <p style="font-size:11px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${u.email}</p>
          </div>
          <span style="font-size:10px;letter-spacing:1px;text-transform:uppercase;color:${isAdminEmail(u)?"var(--gold)":"var(--text3)"};background:${isAdminEmail(u)?"rgba(184,145,106,.15)":"rgba(0,0,0,.04)"};padding:3px 8px;border-radius:4px;flex-shrink:0">${isAdminEmail(u)?"Admin":"Miembro"}</span>
          ${isAdminEmail(u)?"":`<button class="btn-icon-sm" data-mid="${u.id}" data-uemail="${u.email}" title="Eliminar" style="color:#c0392b;flex-shrink:0">✕</button>`}
        </div>`).join("")+`<button class="btn-gold" id="bnm" style="margin-top:14px">+ Agregar miembro</button>`;
      c.querySelectorAll("[data-mid]").forEach(el=>el.addEventListener("click",async()=>{
        const email=el.dataset.uemail;
        if(!confirm(`¿Eliminar a ${email} del equipo?`))return;
        el.disabled=true;el.textContent="...";
        await deleteMember(el.dataset.mid);
        await rl();
      }));
      div.querySelector("#bnm")?.addEventListener("click",()=>{closeModal();openModal("memberform");});
    };
    div.innerHTML=`<div class="modal-bg" id="mbg"><div class="modal">
      <p class="modal-ey">Administración</p>

      <input class="f-inp" id="mfp" type="password" placeholder="Mínimo 6 caracteres"/>

      <p class="success-msg" id="mfok" style="display:none">✓ Miembro creado correctamente</p>
      <div class="modal-btns">
        <button class="btn-mc" id="mcl">Cancelar</button>
        <button class="btn-ms" id="mss">Registrar</button>
      </div>
    </div></div>`;

    div.querySelector("#mcl").addEventListener("click",back);

  if(type==="pass"){
    div.innerHTML=`<div class="modal-bg" id="mbg"><div class="modal">
      <p class="modal-ey">Seguridad</p>
      <h3 class="modal-title">Cambiar contraseña</h3>
      <label class="f-label">Contraseña actual</label>
      <input class="f-inp" id="pc" type="password"/>
      <label class="f-label">Nueva contraseña</label>
      <input class="f-inp" id="pn" type="password" placeholder="Mínimo 6 caracteres"/>
      <label class="f-label">Confirmar nueva contraseña</label>
      <input class="f-inp" id="pn2" type="password"/>
      <p class="err-msg" id="perr" style="display:none"></p>
      <p class="success-msg" id="pok" style="display:none">✓ Contraseña actualizada</p>
      <div class="modal-btns">
        <button class="btn-mc" id="mcl">Cancelar</button>
        <button class="btn-ms" id="mss">Guardar</button>
      </div>
    </div></div>`;
    document.body.appendChild(div);
    div.querySelector("#mcl").addEventListener("click",closeModal);
    div.querySelector("#mbg").addEventListener("click",e=>{if(e.target.id==="mbg")closeModal();});
    div.querySelector("#mss").addEventListener("click",async()=>{
      const curr=div.querySelector("#pc").value,np=div.querySelector("#pn").value,np2=div.querySelector("#pn2").value;
      const errEl=div.querySelector("#perr");errEl.style.display="none";
      if(!curr||!np||!np2){errEl.textContent="Completa todos los campos";errEl.style.display="block";return;}
      if(np.length<6){errEl.textContent="Mínimo 6 caracteres";errEl.style.display="block";return;}
      if(np!==np2){errEl.textContent="Las contraseñas no coinciden";errEl.style.display="block";return;}
      div.querySelector("#mss").disabled=true;
      const err=await changePass(curr,np);
      if(err){errEl.textContent=err;errEl.style.display="block";div.querySelector("#mss").disabled=false;}
      else{div.querySelector("#pok").style.display="block";setTimeout(closeModal,1500);}
    });
    return;
  }
}

// ── INIT ──────────────────────────────────────────────────────────
try{
  const saved=localStorage.getItem("af_s");
  if(saved){
    const s=JSON.parse(saved);
    if(s&&s.user&&s.token){S.user=s.user;S.token=s.token;S.view="portal";}
  }
}catch(e){}

paint();

if(S.view==="portal"){
  S.loading=true;
  paintMain();
  Promise.all([loadCats(),loadVideos(),loadMats()]).then(()=>{
    S.loading=false;
    // Repintar hero con datos actualizados
    const hero=document.querySelector(".hero");
    const prog=document.querySelector(".prog-bar-section");
    if(hero&&prog){
      const t=S.videos.length,sc=S.seen.size,pct=t?Math.round(sc/t*100):0;
      const nums=document.querySelectorAll(".hstat-num");
      if(nums[0])nums[0].textContent=t;
      if(nums[1])nums[1].textContent=sc;
      if(nums[2])nums[2].textContent=pct+"%";
      const pf=document.querySelector(".prog-fill");if(pf)pf.style.width=pct+"%";
      const pp=document.querySelector(".prog-pct");if(pp)pp.textContent=`${sc} / ${t}`;
    }
    paintMain();
  });
}
