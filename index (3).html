<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Academia Ferrari</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--cream:#faf6f1;--cream2:#f5ede2;--gold:#b8916a;--gold2:#d4aa7d;--gold3:#e8c99a;--dark:#1a1510;--dark2:#2c2418;--text:#3d3128;--text2:#7a6a58;--text3:#b0a090;--white:#fffdf9}
body{font-family:'Inter',sans-serif;background:var(--cream);color:var(--text);min-height:100vh;-webkit-text-size-adjust:100%}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;position:relative;overflow:hidden;background:var(--dark)}
.login-bg{position:absolute;inset:0;background:url('https://images.unsplash.com/photo-1596462502278-27bfdc403348?w=1200&q=80') center/cover no-repeat;opacity:.15}
.login-overlay{position:absolute;inset:0;background:linear-gradient(135deg,rgba(26,21,16,.97),rgba(44,36,24,.92))}
.login-card{position:relative;z-index:2;width:min(400px,100%);padding:48px 40px}
.login-ornament-line{display:flex;align-items:center;gap:12px;justify-content:center;margin-bottom:24px}
.login-ornament-line::before,.login-ornament-line::after{content:'';flex:1;max-width:60px;height:1px;background:linear-gradient(90deg,transparent,var(--gold))}
.login-ornament-dot{width:4px;height:4px;border-radius:50%;background:var(--gold)}
.login-brand{font-family:'Playfair Display',serif;font-size:11px;letter-spacing:4px;text-transform:uppercase;color:var(--gold);text-align:center;margin-bottom:6px}
.login-title{font-family:'Playfair Display',serif;font-size:32px;font-weight:400;color:var(--white);text-align:center;line-height:1.2;margin-bottom:4px}
.login-title em{font-style:italic;color:var(--gold3)}
.login-sub{font-size:12px;color:var(--text3);text-align:center;margin-bottom:36px;letter-spacing:.5px;line-height:1.6}
.f-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:8px;display:block}
.f-inp{width:100%;padding:12px 16px;border:1px solid rgba(184,145,106,.25);border-radius:2px;font-size:14px;font-family:'Inter',sans-serif;outline:none;margin-bottom:20px;background:rgba(255,253,249,.05);color:var(--white);transition:border-color .2s}
.f-inp:focus{border-color:var(--gold)}
.f-inp::placeholder{color:rgba(176,160,144,.5)}
.f-inp-light{width:100%;padding:12px 16px;border:1px solid rgba(184,145,106,.2);border-radius:2px;font-size:14px;font-family:'Inter',sans-serif;outline:none;margin-bottom:16px;background:var(--cream);color:var(--text);transition:border-color .2s}
.f-inp-light:focus{border-color:var(--gold)}
.f-ta{width:100%;padding:9px 12px;border:1px solid rgba(184,145,106,.2);border-radius:2px;font-size:13px;font-family:'Inter',sans-serif;outline:none;min-height:80px;resize:vertical;margin-bottom:16px;background:var(--cream);color:var(--text)}
.f-sel{width:100%;padding:9px 12px;border:1px solid rgba(184,145,106,.2);border-radius:2px;font-size:13px;font-family:'Inter',sans-serif;outline:none;margin-bottom:16px;background:var(--cream);color:var(--text)}
.btn-gold{width:100%;padding:14px;background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--dark);border:none;border-radius:2px;font-size:11px;letter-spacing:3px;text-transform:uppercase;font-weight:500;cursor:pointer;font-family:'Inter',sans-serif;margin-top:8px;transition:opacity .2s}
.btn-gold:hover{opacity:.9}
.btn-gold:disabled{opacity:.5;cursor:not-allowed}
.err-msg{color:#e8a090;font-size:12px;text-align:center;margin-top:8px}
.login-disclaimer{font-size:10px;color:var(--text3);text-align:center;margin-top:28px;line-height:1.7;letter-spacing:.3px}
.login-disclaimer strong{color:var(--gold3)}
.header{background:var(--dark);position:sticky;top:0;z-index:100;border-bottom:1px solid rgba(184,145,106,.2)}
.header-inner{max-width:1100px;margin:0 auto;padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:64px}
.header-brand{display:flex;align-items:center;gap:16px}
.header-logo{font-family:'Playfair Display',serif;font-size:18px;color:var(--white);letter-spacing:1px}
.header-logo em{color:var(--gold3);font-style:italic}
.header-divider{width:1px;height:24px;background:rgba(184,145,106,.3)}
.header-sub{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--text3)}
.header-nav{display:flex;align-items:center;gap:4px;flex-wrap:wrap}
.btn-nav{background:transparent;color:var(--text3);border:1px solid transparent;border-radius:2px;padding:7px 12px;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s;white-space:nowrap}
.btn-nav:hover,.btn-nav.on{color:var(--gold);border-color:rgba(184,145,106,.3)}
.hamburger{display:none;background:transparent;border:1px solid rgba(184,145,106,.3);color:var(--gold3);width:40px;height:40px;cursor:pointer;font-size:18px;align-items:center;justify-content:center;flex-direction:column;gap:5px;padding:8px}
.hamburger span{display:block;width:20px;height:1.5px;background:var(--gold3);transition:all .3s}
.mobile-menu{display:none;position:fixed;inset:0;background:rgba(10,8,5,.97);z-index:200;flex-direction:column;align-items:center;justify-content:center;gap:8px}
.mobile-menu.open{display:flex}
.mobile-menu-close{position:absolute;top:20px;right:20px;background:transparent;border:1px solid rgba(184,145,106,.3);color:var(--gold3);width:40px;height:40px;cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center}
.btn-nav-mobile{background:transparent;color:var(--text3);border:none;border-bottom:1px solid rgba(184,145,106,.1);padding:16px 40px;font-size:12px;letter-spacing:3px;text-transform:uppercase;cursor:pointer;font-family:'Inter',sans-serif;width:100%;max-width:280px;text-align:center;transition:color .2s}
.btn-nav-mobile:hover,.btn-nav-mobile.on{color:var(--gold)}
@media(max-width:640px){
  .header-inner{padding:0 16px;height:56px}
  .header-sub{display:none}
  .header-nav{display:none}
  .hamburger{display:flex}
  .hero-section{padding:36px 16px 28px}
  .hero-title{font-size:30px}
  .hero-desc{font-size:15px;margin-bottom:24px}
  .hero-stats{gap:20px}
  .hstat-num{font-size:22px}
  .main{padding:24px 16px 40px}
  .accordion-header{padding:14px 12px}
  .accordion-title{font-size:15px}
  .accordion-prog-wrap{display:none}
  .conf-row{padding:12px 12px;gap:8px}
  .conf-num{display:none}
  .conf-thumb{width:72px;min-width:72px;height:42px}
  .conf-title{font-size:14px}
  .conf-actions{flex-direction:row}
  .mat-grid{grid-template-columns:1fr}
  .analytics-grid{grid-template-columns:1fr}
  .modal{padding:24px 16px}
  .modal-bg{padding:0;align-items:flex-end}
  .player-modal{border-radius:16px 16px 0 0}
}.hero-section{background:var(--dark);position:relative;overflow:hidden;padding:60px 24px 48px}
.hero-section::before{content:'';position:absolute;inset:0;background:url('https://images.unsplash.com/photo-1522335789203-aabd1fc54bc9?w=1400&q=80') center/cover no-repeat;opacity:.08}
.hero-section::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,transparent,var(--dark))}
.hero-inner{max-width:1100px;margin:0 auto;position:relative;z-index:2}
.hero-eyebrow{font-size:10px;letter-spacing:4px;text-transform:uppercase;color:var(--gold);margin-bottom:16px}
.hero-title{font-family:'Playfair Display',serif;font-size:clamp(36px,5vw,60px);font-weight:400;color:var(--white);line-height:1.1;margin-bottom:16px}
.hero-title em{font-style:italic;color:var(--gold3)}
.hero-desc{font-family:'Cormorant Garamond',serif;font-size:18px;color:var(--text3);line-height:1.8;max-width:540px;margin-bottom:36px}
.hero-stats{display:flex;gap:40px}
.hstat{border-left:1px solid rgba(184,145,106,.3);padding-left:16px}
.hstat-num{font-family:'Playfair Display',serif;font-size:28px;color:var(--gold3);font-weight:400}
.hstat-lbl{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--text3);margin-top:2px}
.progress-section{background:var(--dark2);padding:16px 24px;border-top:1px solid rgba(184,145,106,.1)}
.progress-inner{max-width:1100px;margin:0 auto;display:flex;align-items:center;gap:20px}
.progress-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--text3);white-space:nowrap}
.progress-bar-wrap{flex:1;background:rgba(184,145,106,.1);height:2px}
.progress-bar-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold3));transition:width .8s ease}
.progress-pct{font-size:11px;color:var(--gold);font-family:'Playfair Display',serif;white-space:nowrap}
.main{max-width:1100px;margin:0 auto;padding:40px 24px 60px}
.search-wrap{margin-bottom:32px}
.search-inp{width:100%;padding:14px 0;border:none;border-bottom:1px solid rgba(184,145,106,.2);font-size:16px;font-family:'Cormorant Garamond',serif;font-style:italic;background:transparent;outline:none;color:var(--text);transition:border-color .2s;-webkit-appearance:none}
.search-inp:focus{border-bottom-color:var(--gold)}
.search-inp::placeholder{color:var(--text3)}
.accordion-module{border:1px solid rgba(184,145,106,.12);margin-bottom:10px;background:var(--white);transition:border-color .2s}
.accordion-module:hover{border-color:rgba(184,145,106,.3)}
.accordion-header{display:flex;align-items:center;justify-content:space-between;padding:18px 20px;cursor:pointer;gap:12px;user-select:none}
.accordion-left{display:flex;align-items:center;gap:14px;flex:1;min-width:0}
.accordion-icon{width:40px;height:40px;border:1px solid rgba(184,145,106,.25);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;background:rgba(184,145,106,.04)}
.accordion-title{font-family:'Playfair Display',serif;font-size:17px;font-weight:500;color:var(--dark);line-height:1.2}
.accordion-meta{font-size:11px;color:var(--text3);margin-top:3px}
.accordion-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
.accordion-prog-wrap{width:60px;height:2px;background:rgba(184,145,106,.15)}
.accordion-prog-fill{height:100%;background:var(--gold);transition:width .4s}
.accordion-pct{font-size:10px;color:var(--gold);font-family:'Playfair Display',serif;min-width:28px;text-align:right}
.accordion-arrow{font-size:10px;color:var(--text3)}
.accordion-body{border-top:1px solid rgba(184,145,106,.1);padding-bottom:8px}
.conf-row{display:flex;align-items:flex-start;gap:12px;padding:14px 20px;border-bottom:1px solid rgba(184,145,106,.06);transition:background .15s}
.conf-row:last-of-type{border-bottom:none}
.conf-row:hover{background:rgba(184,145,106,.03)}
.conf-row.seen{opacity:.65}
.conf-num{font-family:'Playfair Display',serif;font-size:13px;color:var(--text3);min-width:20px;padding-top:2px;text-align:center}
.conf-thumb{position:relative;width:100px;min-width:100px;height:56px;overflow:hidden;cursor:pointer;background:var(--dark);flex-shrink:0}
.conf-thumb img{width:100%;height:100%;object-fit:cover;transition:transform .3s}
.conf-row:hover .conf-thumb img{transform:scale(1.05)}
.conf-thumb-play{position:absolute;inset:0;background:rgba(10,8,5,.35);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s}
.conf-row:hover .conf-thumb-play{opacity:1}
.conf-play-icon{width:0;height:0;border-top:6px solid transparent;border-bottom:6px solid transparent;border-left:10px solid var(--white);margin-left:2px}
.conf-info{flex:1;min-width:0}
.conf-title{font-family:'Playfair Display',serif;font-size:15px;color:var(--dark);line-height:1.35;cursor:pointer;margin-bottom:5px}
.conf-title:hover{color:var(--gold)}
.conf-meta-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:4px}
.conf-meta-item{font-size:11px;color:var(--text3)}
.conf-seen-tag{font-size:10px;color:var(--gold);background:rgba(184,145,106,.1);padding:2px 7px;border:1px solid rgba(184,145,106,.2)}
.conf-summary{font-family:'Cormorant Garamond',serif;font-size:13px;color:var(--text2);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.conf-actions{display:flex;flex-direction:column;gap:5px;flex-shrink:0}
.conf-btn-watch{width:32px;height:32px;background:var(--dark);border:none;color:var(--gold3);cursor:pointer;font-size:10px;display:flex;align-items:center;justify-content:center;transition:background .15s}
.conf-btn-watch:hover{background:var(--dark2)}
.conf-btn-seen{width:32px;height:32px;background:transparent;border:1px solid rgba(184,145,106,.2);color:var(--text3);cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.conf-btn-seen:hover,.conf-btn-seen.active{border-color:var(--gold);color:var(--gold);background:rgba(184,145,106,.08)}
.conf-btn-icon{width:32px;height:32px;background:transparent;border:1px solid rgba(184,145,106,.12);color:var(--text3);cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.conf-btn-icon:hover{border-color:var(--gold);color:var(--gold)}
.add-btn{width:100%;padding:14px;border:1px dashed rgba(184,145,106,.25);background:transparent;color:var(--gold);font-size:10px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;font-family:'Inter',sans-serif;margin-top:8px;transition:all .2s}
.add-btn:hover{border-color:var(--gold);background:rgba(184,145,106,.03)}
.mat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px}
.pcard{background:var(--white);border:1px solid rgba(184,145,106,.1);padding:24px;transition:all .2s}
.pcard:hover{border-color:rgba(184,145,106,.35);box-shadow:0 8px 32px rgba(184,145,106,.1)}
.pcard-icon{font-size:28px;margin-bottom:14px}
.pcard-cat{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:8px}
.pcard-title{font-family:'Playfair Display',serif;font-size:17px;color:var(--dark);margin-bottom:8px;line-height:1.3}
.pcard-desc{font-family:'Cormorant Garamond',serif;font-size:14px;color:var(--text2);line-height:1.6;margin-bottom:16px}
.btn-download{width:100%;padding:10px;background:transparent;border:1px solid rgba(184,145,106,.25);color:var(--gold);font-size:9px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s}
.btn-download:hover{background:var(--gold);color:var(--dark)}
.analytics-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px}
.acard{background:var(--white);border:1px solid rgba(184,145,106,.1);padding:24px}
.acard-rank{font-family:'Playfair Display',serif;font-size:32px;color:rgba(184,145,106,.2);margin-bottom:12px}
.acard-email{font-size:13px;color:var(--dark);margin-bottom:12px;font-weight:500}
.acard-stats{display:flex;gap:20px}
.acard-stat-num{font-family:'Playfair Display',serif;font-size:22px;color:var(--gold)}
.acard-stat-lbl{font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--text3)}
.upload-zone{border:1px dashed rgba(184,145,106,.3);padding:32px;text-align:center;cursor:pointer;background:rgba(184,145,106,.02);transition:all .2s;margin-bottom:16px}
.upload-zone:hover,.upload-zone.drag{border-color:var(--gold);background:rgba(184,145,106,.05)}
.upload-zone-icon{font-size:28px;margin-bottom:10px}
.upload-zone-txt{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:4px}
.upload-zone-sub{font-size:12px;color:var(--text3)}
.upload-prog{background:rgba(184,145,106,.1);height:1px;margin:10px 0}
.upload-prog-fill{height:100%;background:var(--gold);transition:width .3s}
.modal-bg{position:fixed;inset:0;background:rgba(10,8,5,.85);display:flex;align-items:center;justify-content:center;z-index:999;padding:16px;backdrop-filter:blur(4px)}
.modal{background:var(--white);padding:36px;width:min(520px,100%);max-height:90vh;overflow-y:auto}
.modal-eyebrow{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:10px}
.modal-title{font-family:'Playfair Display',serif;font-size:24px;color:var(--dark);margin-bottom:24px;font-weight:400}
.modal-row{display:flex;gap:10px;margin-top:16px}
.btn-modal-save{flex:1;padding:12px;background:var(--dark);color:var(--gold3);border:none;font-size:9px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s}
.btn-modal-save:disabled{opacity:.5;cursor:not-allowed}
.btn-modal-cancel{padding:12px 20px;background:transparent;border:1px solid rgba(184,145,106,.2);font-size:9px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;color:var(--text3);font-family:'Inter',sans-serif}
.player-modal{background:var(--dark);width:min(680px,96vw);overflow:hidden}
.player-header{padding:20px 24px;border-bottom:1px solid rgba(184,145,106,.15);display:flex;justify-content:space-between;align-items:center}
.player-eyebrow{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:4px}
.player-title{font-family:'Playfair Display',serif;font-size:17px;color:var(--white);font-weight:400}
.player-close{background:transparent;border:1px solid rgba(184,145,106,.2);color:var(--text3);width:32px;height:32px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
.player-close:hover{border-color:var(--gold);color:var(--gold)}
.player-thumb{position:relative;cursor:pointer}
.player-thumb img{width:100%;display:block;max-height:360px;object-fit:cover}
.player-thumb-overlay{position:absolute;inset:0;background:rgba(10,8,5,.45);display:flex;align-items:center;justify-content:center;transition:all .2s}
.player-thumb:hover .player-thumb-overlay{background:rgba(10,8,5,.3)}
.player-play-btn{width:72px;height:72px;border:1px solid rgba(255,253,249,.5);border-radius:50%;display:flex;align-items:center;justify-content:center;transition:all .2s}
.player-thumb:hover .player-play-btn{border-color:var(--gold3);background:rgba(184,145,106,.15)}
.player-play-icon{width:0;height:0;border-top:12px solid transparent;border-bottom:12px solid transparent;border-left:20px solid var(--white);margin-left:5px}
.player-body{padding:24px}
.player-summary{font-family:'Cormorant Garamond',serif;font-size:15px;color:var(--text3);line-height:1.8;margin-bottom:20px}
.btn-player-watch{width:100%;padding:14px;background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--dark);border:none;font-size:9px;letter-spacing:3px;text-transform:uppercase;cursor:pointer;font-family:'Inter',sans-serif;font-weight:500;transition:opacity .2s}
.btn-player-watch:hover{opacity:.9}
.emoji-grid{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.emoji-btn{font-size:20px;padding:8px;border:1px solid rgba(184,145,106,.15);background:transparent;cursor:pointer;border-radius:2px}
.emoji-btn.on{border-color:var(--gold);background:rgba(184,145,106,.08)}
.grad-grid{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.grad-swatch{width:32px;height:32px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .15s}
.grad-swatch.on{border-color:var(--gold);box-shadow:0 0 0 2px var(--gold)}
.mod-row{display:flex;align-items:center;gap:12px;padding:14px 0;border-bottom:1px solid rgba(184,145,106,.08)}
.empty{text-align:center;padding:32px;color:var(--text3);font-family:'Cormorant Garamond',serif;font-size:16px;font-style:italic}
.loading-txt{text-align:center;padding:48px;color:var(--text3);font-size:10px;letter-spacing:3px;text-transform:uppercase}
.congrats{background:var(--dark);border:1px solid rgba(184,145,106,.2);padding:32px;text-align:center;margin-bottom:40px}
.congrats-eyebrow{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:12px}
.congrats-title{font-family:'Playfair Display',serif;font-size:24px;font-style:italic;color:var(--gold3);margin-bottom:8px}
.success-msg{background:rgba(90,180,100,.1);color:#5ab464;font-size:12px;padding:8px 12px;text-align:center;margin-top:8px}
@media(max-width:640px){
  .header-inner{padding:0 16px;height:56px}
  .header-sub{display:none}
  .header-nav{gap:2px}
  .btn-nav{padding:6px 8px;font-size:9px;letter-spacing:1px}
  .hero-section{padding:36px 16px 28px}
  .hero-title{font-size:30px}
  .hero-desc{font-size:15px;margin-bottom:24px}
  .hero-stats{gap:20px}
  .hstat-num{font-size:22px}
  .main{padding:24px 16px 40px}
  .accordion-header{padding:14px 12px}
  .accordion-title{font-size:15px}
  .accordion-prog-wrap{display:none}

async function api(path,opts={}){

}

}

async function loginUser(email,pass){

    state.user=r.user;state.token=r.access_token;state.view="portal";

async function saveVideo(f,editId){
  const body=JSON.stringify({title:f.title,cat_id:f.catId,date:f.date,duration:f.duration,summary:f.summary,url:f.url});
  if(editId)await fetch(`${SUPA_URL}/rest/v1/capacitaciones?id=eq.${editId}`,{method:"PATCH",headers:hdrs(),body});
  else await fetch(`${SUPA_URL}/rest/v1/capacitaciones`,{method:"POST",headers:{...hdrs(),"Prefer":"return=representation"},body});
  state.modal=null;closeModal();await loadVideos();
}

async function deleteVideo(id){
  if(!confirm("¿Eliminar?"))return;
  await fetch(`${SUPA_URL}/rest/v1/capacitaciones?id=eq.${id}`,{method:"DELETE",headers:hdrs()});
  await loadVideos();
}

async function deleteMaterial(id,url){
  if(!confirm("¿Eliminar?"))return;
  const path=url.split("/materiales/")[1];
  if(path)await fetch(`${SUPA_URL}/storage/v1/object/materiales/${path}`,{method:"DELETE",headers:hdrs()});
  await fetch(`${SUPA_URL}/rest/v1/materiales?id=eq.${id}`,{method:"DELETE",headers:hdrs()});
  await loadMateriales();
}

async function uploadMaterial(file,nombre,desc,cat){
  const ext=file.name.split(".").pop();
  const path=`${Date.now()}_${Math.random().toString(36).slice(2)}.${ext}`;
  const ur=await fetch(`${SUPA_URL}/storage/v1/object/materiales/${path}`,{method:"POST",headers:{"apikey":SUPA_KEY,"Authorization":`Bearer ${state.token}`,"Content-Type":file.type},body:file});
  if(!ur.ok)return "Error al subir archivo";
  const url=`${SUPA_URL}/storage/v1/object/public/materiales/${path}`;
  await fetch(`${SUPA_URL}/rest/v1/materiales`,{method:"POST",headers:{...hdrs(),"Prefer":"return=representation"},body:JSON.stringify({nombre,descripcion:desc,categoria:cat,archivo_url:url})});
  await loadMateriales();return null;
}

async function changePass(curr,np){
  const lr=await api("/auth/v1/token?grant_type=password",{method:"POST",body:JSON.stringify({email:state.user.email,password:curr})});
  if(!lr.access_token)return "Contraseña actual incorrecta";
  const ur=await fetch(`${SUPA_URL}/auth/v1/user`,{method:"PUT",headers:{...hdrs(),"Authorization":`Bearer ${lr.access_token}`},body:JSON.stringify({password:np})});
  const ud=await ur.json();return ud.id?null:"Error al cambiar contraseña";
}

function getYTId(url){const m=url&&url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([a-zA-Z0-9_-]{11})/);return m?m[1]:null;}

function toggleSeen(id){

}

function updateProgressBar(){
  const total=state.videos.length,sc=state.seen.size,pct=total?Math.round(sc/total*100):0;
  const pf=document.querySelector(".progress-bar-fill");if(pf)pf.style.width=pct+"%";
  const pl=document.querySelector(".progress-pct");if(pl)pl.textContent=`${sc} / ${total}`;
  const nums=document.querySelectorAll(".hstat-num");
  if(nums[1])nums[1].textContent=sc;
  if(nums[2])nums[2].textContent=pct+"%";
}

function buildAccordionHTML(){
  const sq=state.search.toLowerCase().trim();
  return state.cats.map(cat=>{
    const all=state.videos.filter(v=>v.catId===cat.id);
    const vids=sq?all.filter(v=>v.title.toLowerCase().includes(sq)||v.summary.toLowerCase().includes(sq)):all;
    if(vids.length===0&&!isAdmin()&&!sq)return "";
    if(vids.length===0&&sq)return "";
    const catSeen=all.filter(v=>state.seen.has(v.id)).length;
    const catPct=all.length?Math.round(catSeen/all.length*100):0;
    const open=state.openCats.has(cat.id)||(sq.length>0&&vids.length>0);
    return `<div class="accordion-module">
      <div class="accordion-header" data-toggle="${cat.id}">
        <div class="accordion-left">
          <div class="accordion-icon">${cat.emoji}</div>
          <div>
            <p class="accordion-title">${cat.label}</p>
            <p class="accordion-meta">${all.length} conferencia${all.length!==1?"s":""} · ${catSeen} completada${catSeen!==1?"s":""}</p>
          </div>
        </div>
        <div class="accordion-right">
          <div class="accordion-prog-wrap"><div class="accordion-prog-fill" style="width:${catPct}%"></div></div>
          <span class="accordion-pct">${catPct}%</span>
          <span class="accordion-arrow">${open?"▲":"▼"}</span>
        </div>
      </div>
      ${open?`<div class="accordion-body">
        ${vids.length===0?`<div class="empty">Sin conferencias en este módulo.</div>`:""}
        ${vids.map((v,i)=>{
          const seen=state.seen.has(v.id);
          const ytId=getYTId(v.url);
          const thumb=ytId?`https://img.youtube.com/vi/${ytId}/hqdefault.jpg`:"https://images.unsplash.com/photo-1522335789203-aabd1fc54bc9?w=200&q=60";
          return `<div class="conf-row${seen?" seen":""}">
            <div class="conf-num">${i+1}</div>
            <div class="conf-thumb" data-play="${v.id}">
              <img src="${thumb}" loading="lazy" alt=""/>
              <div class="conf-thumb-play"><div class="conf-play-icon"></div></div>
            </div>
            <div class="conf-info">
              <p class="conf-title" data-play="${v.id}">${v.title}</p>
              <div class="conf-meta-row">
                ${v.duration?`<span class="conf-meta-item">⏱ ${v.duration}</span>`:""}
                ${v.date?`<span class="conf-meta-item">📅 ${v.date}</span>`:""}
                ${seen?`<span class="conf-seen-tag">✓ Vista</span>`:""}
              </div>
              ${v.summary?`<p class="conf-summary">${v.summary}</p>`:""}
            </div>
            <div class="conf-actions">
              <button class="conf-btn-watch" data-play="${v.id}">▶</button>
              <button class="conf-btn-seen${seen?" active":""}" data-seen="${v.id}">${seen?"✓":"○"}</button>
              ${isAdmin()?`<button class="conf-btn-icon" data-edit="${v.id}">✏</button><button class="conf-btn-icon" data-del="${v.id}">✕</button>`:""}
            </div>
          </div>`;
        }).join("")}
        ${isAdmin()?`<button class="add-btn" data-addcat="${cat.id}">+ Agregar conferencia a ${cat.label}</button>`:""}
      </div>`:""}
    </div>`;
  }).join("");
}

function renderAccordion(){
  const c=document.getElementById("accordion-container");
  if(!c)return;
  c.innerHTML=buildAccordionHTML();
  bindAccordion();
}

// ── BIND FUNCTIONS ────────────────────────────────────────────────

function bindLogin(){
  const btn=document.getElementById("l-btn");
  const go=async()=>{
    const email=document.getElementById("l-email").value.trim();
    const pass=document.getElementById("l-pass").value;
    if(!email||!pass)return;
    btn.disabled=true;btn.textContent="Verificando...";
    const err=await loginUser(email,pass);
    if(err){btn.disabled=false;btn.textContent="Ingresar";const e=document.getElementById("l-err");e.textContent=err;e.style.display="block";}
  };
  btn.addEventListener("click",go);
  ["l-email","l-pass"].forEach(id=>document.getElementById(id)?.addEventListener("keydown",e=>e.key==="Enter"&&go()));
}

function bindHeader(){
  const closeMobileMenu=()=>document.getElementById("mobile-menu")?.classList.remove("open");
  const openMobileMenu=()=>document.getElementById("mobile-menu")?.classList.add("open");

  document.getElementById("hamburger-btn")?.addEventListener("click",openMobileMenu);
  document.getElementById("mobile-menu-close")?.addEventListener("click",closeMobileMenu);

  const logout=()=>{
    Object.assign(state,{user:null,token:null,view:"login",videos:[],materiales:[],seen:new Set(),search:"",openCats:new Set()});
    try{localStorage.removeItem("af_session");}catch(e){}
    fullRender();
  };
  document.getElementById("btn-logout")?.addEventListener("click",logout);
  document.getElementById("m-btn-logout")?.addEventListener("click",logout);

  const passModal=()=>openModal("changepass");
  document.getElementById("btn-pass")?.addEventListener("click",passModal);
  document.getElementById("m-btn-pass")?.addEventListener("click",()=>{closeMobileMenu();passModal();});

  const modsModal=()=>openModal("modules");
  document.getElementById("btn-mods")?.addEventListener("click",modsModal);
  document.getElementById("m-btn-mods")?.addEventListener("click",()=>{closeMobileMenu();modsModal();});

  const switchTab=(tab)=>{
    state.activeTab=tab;
    document.querySelectorAll(".btn-nav[data-tab],.btn-nav-mobile[data-tab]").forEach(b=>b.classList.toggle("on",b.dataset.tab===tab));
    renderMainArea();
    if(tab==="analiticas")loadAnalytics();
    closeMobileMenu();
  };
  document.querySelectorAll("[data-tab]").forEach(el=>el.addEventListener("click",()=>switchTab(el.dataset.tab)));
}

function bindMainArea(){
  // Search — does NOT trigger full re-render
  const si=document.getElementById("search-inp");
  if(si){
    si.addEventListener("input",e=>{state.search=e.target.value;renderAccordion();});
    si.addEventListener("keydown",e=>e.stopPropagation());
  }
  bindAccordion();
  // Materiales
  document.querySelectorAll("[data-matcat]").forEach(el=>el.addEventListener("click",()=>{state.matCatFilter=el.dataset.matcat;renderMainArea();}));
  document.getElementById("btn-add-mat")?.addEventListener("click",()=>openModal("matform"));
  document.querySelectorAll("[data-mat-url]").forEach(el=>el.addEventListener("click",()=>{
    registrarActividad("material_descargado");
    const a=document.createElement("a");a.href=el.dataset.matUrl;a.download=el.dataset.matName||"material";a.target="_blank";a.click();
  }));
  document.querySelectorAll("[data-mat-del]").forEach(el=>el.addEventListener("click",()=>deleteMaterial(parseInt(el.dataset.matDel),el.dataset.matUrl2)));
}

function bindAccordion(){
  document.querySelectorAll(".accordion-header[data-toggle]").forEach(el=>el.addEventListener("click",()=>{
    const id=el.dataset.toggle;
    if(state.openCats.has(id))state.openCats.delete(id);else state.openCats.add(id);
    renderAccordion();
  }));
  document.querySelectorAll("[data-seen]").forEach(el=>el.addEventListener("click",e=>{e.stopPropagation();toggleSeen(parseInt(el.dataset.seen));}));
  document.querySelectorAll("[data-play]").forEach(el=>el.addEventListener("click",e=>{
    e.stopPropagation();
    const v=state.videos.find(v=>v.id==el.dataset.play);
    if(v)openModal("player",v);
  }));
  document.querySelectorAll("[data-edit]").forEach(el=>el.addEventListener("click",e=>{
    e.stopPropagation();
    const v=state.videos.find(v=>v.id==el.dataset.edit);
    if(v)openModal("form",v);
  }));
  document.querySelectorAll("[data-del]").forEach(el=>el.addEventListener("click",e=>{e.stopPropagation();deleteVideo(parseInt(el.dataset.del));}));
  document.querySelectorAll("[data-addcat]").forEach(el=>el.addEventListener("click",()=>openModal("form",{catId:el.dataset.addcat})));
}

async function loadAnalytics(){
  const panel=document.getElementById("analytics-panel");if(!panel)return;
  const data=await api("/rest/v1/actividad?order=created_at.desc");
  const arr=Array.isArray(data)?data:[];
  const byUser={};
  arr.forEach(a=>{
    if(!byUser[a.user_email])byUser[a.user_email]={email:a.user_email,vistas:0,descargas:0,ultima:a.created_at};
    if(a.tipo==="capacitacion_vista")byUser[a.user_email].vistas++;
    if(a.tipo==="material_descargado")byUser[a.user_email].descargas++;
    if(a.created_at>byUser[a.user_email].ultima)byUser[a.user_email].ultima=a.created_at;
  });
  const ranking=Object.values(byUser).sort((a,b)=>(b.vistas+b.descargas)-(a.vistas+a.descargas));
  const nums=["I","II","III","IV","V","VI","VII","VIII","IX","X"];
  panel.innerHTML=ranking.length===0?`<div class="empty">Sin actividad registrada aún.</div>`:`<div class="analytics-grid">${ranking.map((u,i)=>`<div class="acard">
    <p class="acard-rank">${nums[i]||i+1}</p>
    <p class="acard-email">${u.email}</p>
    <div class="acard-stats">
      <div><p class="acard-stat-num">${u.vistas}</p><p class="acard-stat-lbl">Vistas</p></div>
      <div><p class="acard-stat-num">${u.descargas}</p><p class="acard-stat-lbl">Descargas</p></div>
    </div>
    <p style="font-size:10px;color:var(--text3);margin-top:12px">Última actividad: ${new Date(u.ultima).toLocaleDateString("es-ES",{day:"2-digit",month:"long",year:"numeric"})}</p>
  </div>`).join("")}</div>`;
}

// ── MODAL ─────────────────────────────────────────────────────────

function openModal(type,data={}){state.modal={type,data};renderModal();}
function closeModal(){state.modal=null;document.getElementById("modal-container")?.remove();}

function renderModal(){
  document.getElementById("modal-container")?.remove();
  if(!state.modal)return;
  const {type,data}=state.modal;
  const div=document.createElement("div");div.id="modal-container";

  if(type==="player"){
    const v=data,ytId=getYTId(v.url),thumb=ytId?`https://img.youtube.com/vi/${ytId}/hqdefault.jpg`:"https://images.unsplash.com/photo-1522335789203-aabd1fc54bc9?w=680&q=80";
    div.innerHTML=`<div class="modal-bg" id="mbg"><div class="player-modal">
      <div class="player-header">
        <div><p class="player-eyebrow">Capacitación</p><p class="player-title">${v.title}</p></div>
        <button class="player-close" id="mc">✕</button>
      </div>
      <div class="player-thumb" id="pthumb"><img src="${thumb}" alt=""/>
        <div class="player-thumb-overlay"><div class="player-play-btn"><div class="player-play-icon"></div></div></div>
      </div>
      <div class="player-body">
        <p class="player-summary">${v.summary}</p>
        <button class="btn-player-watch" id="pwatch">▶ Ver capacitación completa</button>
      </div>
    </div></div>`;
    document.body.appendChild(div);
    div.querySelector("#mc").addEventListener("click",closeModal);
    div.querySelector("#mbg").addEventListener("click",e=>{if(e.target.id==="mbg")closeModal();});
    div.querySelector("#pwatch").addEventListener("click",()=>window.open(v.url,"_blank"));
    div.querySelector("#pthumb").addEventListener("click",()=>window.open(v.url,"_blank"));
    return;
  }

  if(type==="form"){
    const isEdit=!!data.id;
    div.innerHTML=`<div class="modal-bg" id="mbg"><div class="modal">
      <p class="modal-eyebrow">${isEdit?"Editar":"Nueva"} conferencia</p>
      <h3 class="modal-title">${isEdit?"Editar conferencia":"Agregar conferencia"}</h3>
      <label class="f-label">Título</label>
      <input class="f-inp-light" id="ft" value="${(data.title||"").replace(/"/g,"&quot;")}"/>
      <label class="f-label">Módulo</label>
      <select class="f-sel" id="fc">${state.cats.map(c=>`<option value="${c.id}"${data.catId===c.id?" selected":""}>${c.emoji} ${c.label}</option>`).join("")}</select>
      <label class="f-label">Fecha</label>
      <input class="f-inp-light" id="fd" type="date" value="${data.date||""}"/>
      <label class="f-label">Duración</label>
      <input class="f-inp-light" id="fdur" value="${data.duration||""}" placeholder="Ej: 1h 15min"/>
      <label class="f-label">Link de YouTube o Google Drive</label>
      <input class="f-inp-light" id="fu" value="${(data.url||"").replace(/"/g,"&quot;")}"/>
      <label class="f-label">Resumen</label>
      <textarea class="f-ta" id="fs">${data.summary||""}</textarea>
      <div class="modal-row">
        <button class="btn-modal-cancel" id="mc">Cancelar</button>
        <button class="btn-modal-save" id="ms">Guardar</button>
      </div>
    </div></div>`;
    document.body.appendChild(div);
    div.querySelector("#mc").addEventListener("click",closeModal);
    div.querySelector("#mbg").addEventListener("click",e=>{if(e.target.id==="mbg")closeModal();});
    div.querySelector("#ms").addEventListener("click",async()=>{
      const f={title:div.querySelector("#ft").value,catId:div.querySelector("#fc").value,date:div.querySelector("#fd").value,duration:div.querySelector("#fdur").value,url:div.querySelector("#fu").value,summary:div.querySelector("#fs").value};
      if(!f.title||!f.url)return;
      const btn=div.querySelector("#ms");btn.disabled=true;btn.textContent="Guardando...";
      await saveVideo(f,data.id||null);
    });
    return;
  }

  if(type==="matform"){
    let selFile=null;
    div.innerHTML=`<div class="modal-bg" id="mbg"><div class="modal">
      <p class="modal-eyebrow">Biblioteca</p>
      <h3 class="modal-title">Subir material</h3>
      <label class="f-label">Nombre</label>
      <input class="f-inp-light" id="mn" placeholder="Ej: Manual de ventas"/>
      <label class="f-label">Categoría</label>
      <select class="f-sel" id="mcat">${MAT_CATS.map(c=>`<option value="${c}">${c}</option>`).join("")}</select>
      <label class="f-label">Descripción</label>
      <textarea class="f-ta" id="md" placeholder="Breve descripción..."></textarea>
      <label class="f-label">Archivo</label>
      <div class="upload-zone" id="uz">
        <div class="upload-zone-icon">📁</div>
        <p class="upload-zone-txt" id="uzt">Seleccionar archivo</p>
        <p class="upload-zone-sub">PDF, DOC, DOCX, XLS, XLSX, PPT · Máx 50MB</p>
        <input type="file" id="mf" accept=".pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx" style="display:none"/>
      </div>
      <div id="upw" style="display:none"><div class="upload-prog"><div class="upload-prog-fill" id="upf" style="width:0%"></div></div>
      <p style="font-size:11px;color:var(--gold);text-align:center;margin-top:6px" id="upt">Subiendo...</p></div>
      <p class="err-msg" id="me" style="display:none"></p>
      <div class="modal-row">
        <button class="btn-modal-cancel" id="mc">Cancelar</button>
        <button class="btn-modal-save" id="ms">Subir material</button>
      </div>
    </div></div>`;
    document.body.appendChild(div);
    div.querySelector("#mc").addEventListener("click",closeModal);
    div.querySelector("#mbg").addEventListener("click",e=>{if(e.target.id==="mbg")closeModal();});
    const uz=div.querySelector("#uz");
    uz.addEventListener("click",()=>div.querySelector("#mf").click());
    div.querySelector("#mf").addEventListener("change",e=>{selFile=e.target.files[0];if(selFile)div.querySelector("#uzt").textContent="✓ "+selFile.name;});
    uz.addEventListener("dragover",e=>{e.preventDefault();uz.classList.add("drag");});
    uz.addEventListener("dragleave",()=>uz.classList.remove("drag"));
    uz.addEventListener("drop",e=>{e.preventDefault();uz.classList.remove("drag");selFile=e.dataTransfer.files[0];if(selFile)div.querySelector("#uzt").textContent="✓ "+selFile.name;});
    div.querySelector("#ms").addEventListener("click",async()=>{
      const nombre=div.querySelector("#mn").value.trim(),desc=div.querySelector("#md").value.trim(),cat=div.querySelector("#mcat").value;
      const errEl=div.querySelector("#me");errEl.style.display="none";
      if(!nombre){errEl.textContent="Escribe el nombre";errEl.style.display="block";return;}
      if(!selFile){errEl.textContent="Selecciona un archivo";errEl.style.display="block";return;}
      const btn=div.querySelector("#ms");btn.disabled=true;btn.textContent="Subiendo...";
      div.querySelector("#upw").style.display="block";
      let p=0;const iv=setInterval(()=>{p=Math.min(p+8,85);div.querySelector("#upf").style.width=p+"%";},200);
      const err=await uploadMaterial(selFile,nombre,desc,cat);
      clearInterval(iv);div.querySelector("#upf").style.width="100%";
      if(err){errEl.textContent=err;errEl.style.display="block";btn.disabled=false;btn.textContent="Subir material";}
      else{div.querySelector("#upt").textContent="¡Subido!";setTimeout(closeModal,600);}
    });
    return;
  }

  if(type==="modules"){
    const renderList=()=>{
      const c=div.querySelector("#ml");if(!c)return;
      c.innerHTML=state.cats.map((cat,i)=>`<div class="mod-row">
        <span style="font-size:20px">${cat.emoji}</span>
        <span style="flex:1;font-size:14px;color:var(--text)">${cat.label}</span>
        <button class="conf-btn-icon" data-me="${i}">✏</button>
        <button class="conf-btn-icon" data-md="${i}">✕</button>
      </div>`).join("")+`<button class="btn-gold" id="bam" style="margin-top:16px">+ Nuevo módulo</button>`;
      c.querySelectorAll("[data-md]").forEach(el=>el.addEventListener("click",()=>{
        const i=parseInt(el.dataset.md);if(confirm(`¿Eliminar "${state.cats[i].label}"?`)){state.cats.splice(i,1);saveCats(state.cats);renderList();}
      }));
      c.querySelectorAll("[data-me]").forEach(el=>el.addEventListener("click",()=>{
        closeModal();openModal("modform",{...state.cats[parseInt(el.dataset.me)],index:parseInt(el.dataset.me)});
      }));
      div.querySelector("#bam")?.addEventListener("click",()=>{closeModal();openModal("modform",{});});
    };
    div.innerHTML=`<div class="modal-bg" id="mbg"><div class="modal">
      <p class="modal-eyebrow">Configuración</p><h3 class="modal-title">Gestión de módulos</h3>
      <div id="ml"></div>
      <div class="modal-row"><button class="btn-modal-cancel" id="mc">Cerrar</button></div>
    </div></div>`;
    document.body.appendChild(div);
    div.querySelector("#mc").addEventListener("click",closeModal);
    div.querySelector("#mbg").addEventListener("click",e=>{if(e.target.id==="mbg")closeModal();});
    renderList();return;
  }

  if(type==="modform"){
    const isEdit=data.index!==undefined;
    let selE=data.emoji||EMOJIS[0],selG=data.g||GRADIENTS[0];
    div.innerHTML=`<div class="modal-bg" id="mbg"><div class="modal">
      <p class="modal-eyebrow">${isEdit?"Editar":"Nuevo"} módulo</p>
      <h3 class="modal-title">${isEdit?"Editar módulo":"Crear módulo"}</h3>
      <label class="f-label">Nombre</label>
      <input class="f-inp-light" id="mln" value="${data.label||""}" placeholder="Ej: Liderazgo"/>
      <label class="f-label">Ícono</label>
      <div class="emoji-grid">${EMOJIS.map(e=>`<button class="emoji-btn${e===selE?" on":""}" data-e="${e}">${e}</button>`).join("")}</div>
      <label class="f-label">Color</label>
      <div class="grad-grid">${GRADIENTS.map(g=>`<div class="grad-swatch${g===selG?" on":""}" data-g="${g}" style="background:linear-gradient(135deg,${g})"></div>`).join("")}</div>
      <div class="modal-row">
        <button class="btn-modal-cancel" id="mc">Cancelar</button>
        <button class="btn-modal-save" id="ms">Guardar</button>
      </div>
    </div></div>`;
    document.body.appendChild(div);
    const back=()=>{closeModal();openModal("modules");};
    div.querySelector("#mc").addEventListener("click",back);
    div.querySelector("#mbg").addEventListener("click",e=>{if(e.target.id==="mbg")back();});
    div.querySelectorAll("[data-e]").forEach(el=>el.addEventListener("click",()=>{selE=el.dataset.e;div.querySelectorAll("[data-e]").forEach(b=>b.classList.toggle("on",b.dataset.e===selE));}));
    div.querySelectorAll("[data-g]").forEach(el=>el.addEventListener("click",()=>{selG=el.dataset.g;div.querySelectorAll("[data-g]").forEach(b=>b.classList.toggle("on",b.dataset.g===selG));}));
    div.querySelector("#ms").addEventListener("click",()=>{
      const name=div.querySelector("#mln").value.trim();if(!name)return;
      if(isEdit)state.cats[data.index]={...state.cats[data.index],label:name,emoji:selE,g:selG};
      else state.cats.push({id:"m"+Date.now(),label:name,emoji:selE,g:selG});
      saveCats(state.cats);closeModal();openModal("modules");
    });
    return;
  }

  if(type==="changepass"){
    div.innerHTML=`<div class="modal-bg" id="mbg"><div class="modal">
      <p class="modal-eyebrow">Seguridad</p><h3 class="modal-title">Cambiar contraseña</h3>
      <label class="f-label">Contraseña actual</label><input class="f-inp-light" id="cc" type="password"/>
      <label class="f-label">Nueva contraseña</label><input class="f-inp-light" id="cn" type="password" placeholder="Mínimo 6 caracteres"/>
      <label class="f-label">Confirmar nueva contraseña</label><input class="f-inp-light" id="cn2" type="password"/>
      <p class="err-msg" id="ce" style="display:none"></p>
      <p class="success-msg" id="cok" style="display:none">✓ Contraseña actualizada</p>
      <div class="modal-row">
        <button class="btn-modal-cancel" id="mc">Cancelar</button>
        <button class="btn-modal-save" id="ms">Guardar</button>
      </div>
    </div></div>`;
    document.body.appendChild(div);
    div.querySelector("#mc").addEventListener("click",closeModal);
    div.querySelector("#mbg").addEventListener("click",e=>{if(e.target.id==="mbg")closeModal();});
    div.querySelector("#ms").addEventListener("click",async()=>{
      const curr=div.querySelector("#cc").value,np=div.querySelector("#cn").value,np2=div.querySelector("#cn2").value;
      const errEl=div.querySelector("#ce");errEl.style.display="none";
      if(!curr||!np||!np2){errEl.textContent="Completa todos los campos";errEl.style.display="block";return;}
      if(np.length<6){errEl.textContent="Mínimo 6 caracteres";errEl.style.display="block";return;}
      if(np!==np2){errEl.textContent="Las contraseñas no coinciden";errEl.style.display="block";return;}
      div.querySelector("#ms").disabled=true;
      const err=await changePass(curr,np);
      if(err){errEl.textContent=err;errEl.style.display="block";div.querySelector("#ms").disabled=false;}
      else{div.querySelector("#cok").style.display="block";setTimeout(closeModal,1500);}
    });
    return;
  }
}

// ── INIT ──────────────────────────────────────────────────────────
// Restore session if exists
try{
  const saved=localStorage.getItem("af_session");
  if(saved){
    const s=JSON.parse(saved);
    if(s.user&&s.token){state.user=s.user;state.token=s.token;state.view="portal";}
  }
}catch(e){}
fullRender();
if(state.view==="portal"){loadVideos();loadMateriales();}
</script>
